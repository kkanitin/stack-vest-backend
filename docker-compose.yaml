services:
  mongodb:
    image: mongo:8.0
    container_name: stackvest-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: changeme
      MONGO_INITDB_DATABASE: stackvest
    volumes:
      - /path/to/your/local/data/db:/data/db

  redis:
    image: redis:7
    container_name: stackvest-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]